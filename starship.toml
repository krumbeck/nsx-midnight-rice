# =============================================================================
# NSX Rice вҖ” starship.toml
# Palette: Sanzo Wada вҖ” 7жңҲгҒ®й…ҚиүІ / Tech Geisha
#
# Idle:   жЎ”жў—иүІ (Blue Violet) вҖ” ruhige Tiefe
# Action: йЈҙиүІ (Orange Rufous) вҖ” warmer Akzent, prГӨzise
# =============================================================================

format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

right_format = """
$python\
$nodejs\
$rust\
$docker_context"""

add_newline = true

# Verzeichnis вҖ” жЎ”жў—иүІ
[directory]
style = "bold #5c3d9e"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "вҖҰ/"
home_symbol = "~"
read_only = " у°Ңҫ"
read_only_style = "#c97a2a"
format = "[$path]($style)[$read_only]($read_only_style) "

# Git Branch вҖ” йі©зҫҪзҙ«
[git_branch]
style = "bold #b57fb8"
symbol = " "
format = "[$symbol$branch]($style) "
truncation_length = 20
truncation_symbol = "вҖҰ"

# Git Status вҖ” йЈҙиүІ
[git_status]
style = "#c97a2a"
format = "([$all_status$ahead_behind]($style) )"
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
staged = "[+${count}](bold #5c9e7a)"
modified = "[~${count}](#c97a2a)"
deleted = "[-${count}](bold #c45c5c)"
untracked = "[?${count}](#6e6a86)"
renamed = "[В»${count}](#b57fb8)"
stashed = "[у°Ҷј ](#5c3d9e)"

# Command Duration
[cmd_duration]
min_time = 2_000
style = "#6e6a86"
format = "[уұҰҹ $duration]($style) "

# Character
# Erfolg: жЎ”жў—иүІ вҖ” ruhige Seele
# Fehler: йЈҙиүІ вҖ” warmer Alarm
[character]
success_symbol = "[вқҜ](bold #5c3d9e)"
error_symbol = "[вқҜ](bold #c97a2a)"
vimcmd_symbol = "[вқ®](bold #5c3d9e)"

# Sprachen
[python]
style = "#c97a2a"
symbol = " "
format = "[$symbol$version( \\($virtualenv\\))]($style) "

[nodejs]
style = "#5c9e7a"
symbol = " "
format = "[$symbol$version]($style) "

[rust]
style = "#c97a2a"
symbol = " "
format = "[$symbol$version]($style) "

[docker_context]
style = "#4a6fa5"
symbol = " "
format = "[$symbol$context]($style) "
only_with_files = true

# Deaktiviert
[aws]
disabled = true
[gcloud]
disabled = true
[battery]
disabled = true
[time]
disabled = true
[username]
disabled = true
[hostname]
disabled = true
[package]
disabled = true

# =============================================================================
# Ende вҖ” NSX Rice / starship.toml вҖ” 7жңҲгҒ®й…ҚиүІ
# =============================================================================
