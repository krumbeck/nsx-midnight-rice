#? Config file for btop v. 1.3.0+
# =============================================================================
# NSX Midnight Rice — btop.conf
# System Monitor: Tachometer & Instrumententafel
# Philosophie: Alle kritischen Werte auf einen Blick — wie das NSX-Cockpit
# Pfad: ~/.config/btop/btop.conf
# =============================================================================


# -----------------------------------------------------------------------------
# FARBTHEMA
# Wir nutzen ein custom Theme — btop.conf referenziert eine .theme Datei
# Pfad: ~/.config/btop/themes/nsx-midnight.theme
# -----------------------------------------------------------------------------

color_theme = "nsx-midnight"

# Hintergrund transparent (Terminal-Hintergrund durchscheinen lassen)
# Aktiviert die Glass-Cockpit Ästhetik von kitty
theme_background = False


# -----------------------------------------------------------------------------
# LAYOUT — die Instrumententafel
#
# Optionen:
#   "cpu mem net proc"     — Standard (alle vier)
#   "cpu proc"             — Fokus auf CPU + Prozesse
#   "cpu mem proc"         — ohne Netzwerk
#
# NSX-Wahl: Alles sichtbar — 311° Rundumsicht
# -----------------------------------------------------------------------------

shown_boxes = "cpu mem net proc"

# Prozessliste — nach CPU sortiert
proc_sorting = "cpu lazy"
proc_reversed = False
proc_tree = False
proc_colors = True
proc_gradient = True
proc_per_core = True
proc_mem_bytes = True
proc_cpu_graphs = True
proc_info_smaps = False
proc_left = False
proc_filter_kernel = False


# -----------------------------------------------------------------------------
# CPU — der Drehzahlmesser
# -----------------------------------------------------------------------------

# Aktualisierungsintervall in Millisekunden
# 2000ms = sanfte Animation, nicht zu aggressiv
update_ms = 2000

# CPU-Graph zeigt einzelne Kerne
cpu_graph_upper = "total"
cpu_graph_lower = "user"

# Temperatur anzeigen
check_temp = True
cpu_sensor = "Auto"

# Kern-Frequenz anzeigen
show_cpu_freq = True

# Clock unten im CPU-Box
clock_format = "%H:%M"

# Gradient im CPU-Graph — wie die Drehzahlnadel die sich hebt
cpu_single_graph = False
cpu_bottom = False


# -----------------------------------------------------------------------------
# SPEICHER — Tankfüllung
# -----------------------------------------------------------------------------

# Swap anzeigen
mem_show_swap = True
mem_swap_disk = True

# Festplatten-IO anzeigen
show_disks = True
only_physical = True

# Disk-Filter (leere Einträge ausblenden)
disk_free_prct = False
io_mode = False
io_graph_combined = False
io_graph_speeds = ""


# -----------------------------------------------------------------------------
# NETZWERK — Verbindungsqualität
# -----------------------------------------------------------------------------

net_download = 100        # Erwartete Max-Downloadgeschwindigkeit (Mbps)
net_upload = 20           # Erwartete Max-Uploadgeschwindigkeit (Mbps)
net_auto = True           # Automatisch skalieren
net_sync = False          # Up/Down synchron skalieren
net_iface = ""            # Leer = automatisch erkennen


# -----------------------------------------------------------------------------
# DARSTELLUNG
# -----------------------------------------------------------------------------

# Abgerundete Ecken — konsistent mit dem Rest des Rice (rounding = 10)
rounded_corners = True

# Graph-Symbole — braille für maximale Auflösung im Terminal
graph_symbol = "braille"
graph_symbol_cpu = "default"
graph_symbol_gpu = "default"
graph_symbol_mem = "default"
graph_symbol_net = "default"
graph_symbol_proc = "default"

# Gradient-Effekt in Graphen — der Flip-Flop Effekt
proc_gradient = True

# Box-Titel fett
bold_header = True

# Hintergrund der Menüs
background_update = True

# Vim-Style Navigation
vim_keys = True


# -----------------------------------------------------------------------------
# VERHALTEN
# -----------------------------------------------------------------------------

# Beim Start minimiert
minimized = False

# Warnung bei hoher CPU-Temperatur
temp_scale = "celsius"

# Einheiten
base_10_sizes = False     # False = 1024er Basis (GiB statt GB)

# Log-Level (ERROR = minimal, kein Rauschen)
log_level = "ERROR"


# =============================================================================
# Ende — NSX Midnight Rice / btop.conf
# Das Theme (nsx-midnight.theme) folgt als separate Datei
# =============================================================================
