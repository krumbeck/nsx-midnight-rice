# =============================================================================
# NSX Midnight Rice — hyprland.conf
# Compositor: Hyprland (Wayland)
# Philosophie: Human-Machine Interface — Präzision, kein Bloat, VTEC-Seelen
# =============================================================================
# Struktur:
#   1. Monitor
#   2. Autostart
#   3. Umgebungsvariablen
#   4. Input
#   5. General (Gaps, Borders)
#   6. Decoration (Blur, Rounding, Schatten)
#   7. Animationen — die zwei Seelen
#   8. Layouts
#   9. Misc
#  10. Keybindings
#  11. Window Rules
# =============================================================================


# -----------------------------------------------------------------------------
# 1. MONITOR
# Anpassen wenn ThinkPad-Display bekannt ist.
# Beispiel: monitor=eDP-1,1920x1080@60,0x0,1
# -----------------------------------------------------------------------------

monitor = , preferred, auto, 1


# -----------------------------------------------------------------------------
# 2. AUTOSTART — Nur was gebraucht wird. Kein Bloat.
# -----------------------------------------------------------------------------

# Wallpaper-Daemon
exec-once = swww-daemon

# Wallpaper setzen — Pfad anpassen
exec-once = swww img ~/Pictures/wallpapers/tokyo-night.jpg --transition-type fade --transition-duration 2

# Status Bar
exec-once = waybar

# Notification Daemon
exec-once = swaync

# Polkit Agent (für sudo-Dialoge in GUI)
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Clipboard Manager
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store


# -----------------------------------------------------------------------------
# 3. UMGEBUNGSVARIABLEN
# Wayland-native, keine XWayland-Krücken wo vermeidbar
# -----------------------------------------------------------------------------

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic

# Wayland für gängige Toolkits erzwingen
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# GPU (AMD — Radeon Vega, ThinkPad anpassen falls nötig)
env = WLR_DRM_NO_ATOMIC,1


# -----------------------------------------------------------------------------
# 4. INPUT — Fingerkuppen-Bedienung
# -----------------------------------------------------------------------------

input {
    kb_layout = de
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    # Tastaturwiederholung
    repeat_rate = 50
    repeat_delay = 300

    # Touchpad
    touchpad {
        natural_scroll = true
        scroll_factor = 0.8
        tap-to-click = true
        drag_lock = false
        disable_while_typing = true
    }

    sensitivity = 0.0
    follow_mouse = 1
    mouse_refocus = false
}

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_invert = true
    workspace_swipe_min_speed_to_force = 30
}


# -----------------------------------------------------------------------------
# 5. GENERAL — Gaps & Borders
# Moderate Gaps: die Stadt atmet durch (NSX-Prinzip: Rundumsicht)
# -----------------------------------------------------------------------------

general {
    gaps_in = 6
    gaps_out = 12

    border_size = 2

    # Midnight Purple als aktive Border — die DNA ist überall sichtbar
    col.active_border = rgba(7B52ABff) rgba(FF00FFff) 45deg
    col.inactive_border = rgba(191724aa)

    layout = dwindle

    resize_on_border = true
    hover_icon_on_border = true
}


# -----------------------------------------------------------------------------
# 6. DECORATION — Das Glass Cockpit
# Blur + Rounding = F-16 Kanzel Ästhetik
# -----------------------------------------------------------------------------

decoration {
    # Aerodynamische Ecken — konsistent 10px im gesamten Rice
    rounding = 10

    # Aktives Fenster leicht heller
    active_opacity = 0.93
    inactive_opacity = 0.85
    fullscreen_opacity = 1.0

    # Blur — die Stadt scheint durch
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        xray = false
        ignore_opacity = false
        noise = 0.02
        contrast = 1.1
        brightness = 0.9
        vibrancy = 0.2
        vibrancy_darkness = 0.2
    }

    # Schatten — subtil, nicht dramatisch
    drop_shadow = true
    shadow_range = 20
    shadow_render_power = 3
    col.shadow = rgba(7B52AB66)
    col.shadow_inactive = rgba(0B081166)
    shadow_offset = 0 4
}


# -----------------------------------------------------------------------------
# 7. ANIMATIONEN — Die zwei Seelen (VTEC-Prinzip)
#
# Idle-Seele: Weiche, fließende Übergänge — Shuto Expressway um 3 Uhr morgens
# Action-Seele: Schnell, präzise — VTEC über 5.800 U/min
#
# Hyprland Bezier-Kurven:
# bezier = name, x0, y0, x1, y1
# -----------------------------------------------------------------------------

animations {
    enabled = true

    # Bezier-Kurven definieren
    # vtec: schneller Einstieg, weiches Ausrollen — wie der Nockenwellen-Übergang
    bezier = vtec, 0.05, 0.9, 0.1, 1.05

    # midnight: langsam, fließend — die ruhige Seele
    bezier = midnight, 0.4, 0.0, 0.2, 1.0

    # snap: sofortige Reaktion — präzise wie die NSX-Lenkung
    bezier = snap, 0.25, 0.46, 0.45, 0.94

    # Fenster öffnen / schließen
    animation = windows, 1, 4, vtec, slide
    animation = windowsOut, 1, 3, midnight, slide
    animation = windowsMove, 1, 3, snap

    # Border-Farb-Animation (der Flip-Flop-Effekt des Midnight Purple Lacks)
    animation = border, 1, 6, midnight
    animation = borderangle, 1, 60, midnight, loop

    # Fade
    animation = fade, 1, 4, midnight
    animation = fadeOut, 1, 3, midnight

    # Workspaces — fließend wie Spurwechsel auf der Shutoko
    animation = workspaces, 1, 4, vtec, slide
    animation = specialWorkspace, 1, 4, vtec, slidevert
}


# -----------------------------------------------------------------------------
# 8. LAYOUTS
# -----------------------------------------------------------------------------

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

master {
    new_is_master = false
    new_on_top = false
    mfact = 0.55
}


# -----------------------------------------------------------------------------
# 9. MISC
# -----------------------------------------------------------------------------

misc {
    # Kein Hyprland-Splash beim Start
    disable_hyprland_logo = true
    disable_splash_rendering = true

    # VRR (Variable Refresh Rate) wenn Monitor es unterstützt
    vfr = true
    vrr = 0

    # Fokus beim Hovern
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true

    focus_on_activate = false

    # Kein Animationsstopp bei Batterie
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
}


# -----------------------------------------------------------------------------
# 10. KEYBINDINGS — Satelliten-Schalter
# SUPER = die Hauptmodifikationstaste (Windows-Taste)
# Philosophie: Alles erreichbar ohne die Hände vom "Lenkrad" zu nehmen
# -----------------------------------------------------------------------------

# Haupt-Modifier
$mod = SUPER

# Terminal
bind = $mod, Return, exec, kitty

# Launcher (Rofi)
bind = $mod, Space, exec, rofi -show drun

# Dateimanager
bind = $mod, E, exec, thunar

# Browser
bind = $mod, B, exec, firefox

# Notification Center
bind = $mod, N, exec, swaync-client -t

# Screenshot (ganzer Screen)
bind = , Print, exec, grimblast copy screen

# Screenshot (Auswahl)
bind = SHIFT, Print, exec, grimblast copy area

# Clipboard History
bind = $mod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Fenster schließen
bind = $mod, Q, killactive

# Hyprland beenden
bind = $mod SHIFT, M, exit

# Fenster floating toggle
bind = $mod, F, togglefloating

# Fullscreen
bind = $mod, Z, fullscreen, 0

# Pseudo-Tiling (Dwindle)
bind = $mod, P, pseudo

# Split-Richtung wechseln
bind = $mod, T, togglesplit

# --- Fokus bewegen (HJKL — Vim-Style) ---
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# --- Fenster verschieben ---
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# --- Workspaces 1-9 ---
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# --- Fenster zu Workspace verschieben ---
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# --- Scratchpad (Special Workspace) ---
bind = $mod, S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace, special:magic

# --- Maus-Scrolling durch Workspaces ---
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# --- Fenster mit Maus bewegen/resizen ---
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# --- Lautstärke (Media Keys) ---
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# --- Helligkeit ---
bind = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-


# -----------------------------------------------------------------------------
# 11. WINDOW RULES — Präzisions-Abstimmung
# Bestimmte Apps bekommen spezielle Behandlung
# -----------------------------------------------------------------------------

# Floating Apps
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(thunar)$, title:^(Datei.*)$
windowrulev2 = float, class:^(org.gnome.Calculator)$

# Rofi — kein Blur-Override
windowrulev2 = noblur, class:^(rofi)$

# Kitty — maximale Transparenz (Glass Cockpit)
windowrulev2 = opacity 0.93 0.85, class:^(kitty)$

# Firefox — volle Opazität (kein Blur auf Webseiten)
windowrulev2 = opacity 1.0 1.0, class:^(firefox)$

# Btop — leicht transparent
windowrulev2 = opacity 0.90 0.85, class:^(btop)$

# Floating-Fenster zentrieren
windowrulev2 = center, floating:1


# =============================================================================
# Ende — NSX Midnight Rice / hyprland.conf
# "Alles muss mit Fingerkuppen-Bedienung erreichbar sein."
# =============================================================================
