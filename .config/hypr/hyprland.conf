# =============================================================================
# NSX Rice — hyprland.conf
# Palette: Sanzo Wada — 7月の配色 / Tech Geisha
# Syntax: Hyprland 0.54.2
# =============================================================================

monitor = eDP-1, 1920x1080@60, 0x0, 1

exec-once = swww-daemon
exec-once = swww img ~/Pictures/wallpapers/tokyo-night.jpg --transition-type fade --transition-duration 2
exec-once = waybar
exec-once = swaync
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1

input {
    kb_layout = de
    repeat_rate = 50
    repeat_delay = 300
    sensitivity = 0.0
    follow_mouse = 1
    mouse_refocus = false

    touchpad {
        natural_scroll = true
        scroll_factor = 0.8
        tap-to-click = true
        drag_lock = 0
        disable_while_typing = true
    }
}

# Gestures — neue Syntax 0.51+
gesture = 3, horizontal, workspace

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2

    # 桔梗色 → 鳩羽紫 Gradient
    col.active_border = rgba(5c3d9eff) rgba(b57fb8ff) 45deg
    # 褐色 inaktiv
    col.inactive_border = rgba(0d0d1faa)

    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 10
    rounding_power = 3.0

    active_opacity = 0.93
    inactive_opacity = 0.85
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 8
        passes = 3
        ignore_opacity = true
        new_optimizations = true
        xray = false
        noise = 0.02
        contrast = 1.1
        brightness = 0.9
        vibrancy = 0.2
        vibrancy_darkness = 0.2
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(5c3d9e55)
        color_inactive = rgba(0d0d1f66)
        offset = 0, 4
    }
}

animations {
    enabled = true

    bezier = vtec, 0.05, 0.9, 0.1, 1.05
    bezier = midnight, 0.4, 0.0, 0.2, 1.0
    bezier = snap, 0.25, 0.46, 0.45, 0.94

    animation = windows, 1, 4, vtec, slide
    animation = windowsOut, 1, 3, midnight, slide
    animation = windowsMove, 1, 3, snap
    animation = border, 1, 6, midnight
    animation = borderangle, 1, 60, midnight, loop
    animation = fade, 1, 4, midnight
    animation = fadeOut, 1, 3, midnight
    animation = workspaces, 1, 4, vtec, slide
    animation = specialWorkspace, 1, 4, vtec, slidevert
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

master {
    new_status = slave
    new_on_top = false
    mfact = 0.55
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
    vrr = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    focus_on_activate = false
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
}

cursor {
    no_hardware_cursors = false
}

$mod = SUPER

bind = $mod, Return, exec, kitty
bind = $mod, Space, exec, rofi -show drun
bind = $mod, E, exec, thunar
bind = $mod, B, exec, firefox
bind = $mod, N, exec, swaync-client -t
bind = , Print, exec, grimblast copy screen
bind = SHIFT, Print, exec, grimblast copy area
bind = $mod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mod, Q, killactive
bind = $mod SHIFT, M, exit
bind = $mod, F, togglefloating
bind = $mod, Z, fullscreen, 0
bind = $mod, P, pseudo
bind = $mod, T, togglesplit

bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bind = $mod, S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace, special:magic

bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Korrigierte Window Rules nach Hyprland Wiki (on)
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(org.gnome.Calculator)$
windowrule = no_blur on, match:class ^(rofi)$
windowrule = opacity 0.93 0.85, match:class ^(kitty)$
windowrule = opacity 1.0 1.0, match:class ^(firefox)$
windowrule = opacity 0.90 0.85, match:class ^(btop)$
windowrule = center on, match:float true

# =============================================================================
# Ende — NSX Rice / hyprland.conf — 7月の配色 / Tech Geisha
# =============================================================================
