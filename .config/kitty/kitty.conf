# =============================================================================
# NSX Midnight Rice — kitty.conf
# Terminal: Glass Cockpit (F-16 Kanzel Ästhetik)
# Philosophie: 311° Sicht, klinische Klarheit, VTEC-Bereitschaft
# =============================================================================


# -----------------------------------------------------------------------------
# FONT — Cockpit Display
# JetBrainsMono Nerd Font: technisch, klar, mit Icon-Support für Starship
# -----------------------------------------------------------------------------

font_family                 JetBrainsMono Nerd Font
bold_font                   JetBrainsMono Nerd Font Bold
italic_font                 JetBrainsMono Nerd Font Italic
bold_italic_font            JetBrainsMono Nerd Font Bold Italic

font_size                   11.5

# Feinabstimmung — wie Senna am Chassis
adjust_line_height          2
adjust_column_width         0
text_composition_strategy   platform


# -----------------------------------------------------------------------------
# FARBEN — Midnight Purple Pearl (PB-73P)
# Die Farbpalette ist die DNA des gesamten Rice
# -----------------------------------------------------------------------------

# Hintergrund & Vordergrund
background                  #0B0811
foreground                  #E0DEF4

# Cursor — die Tachometer-Nadel
cursor                      #FF8C00
cursor_text_color           #0B0811
cursor_shape                block
cursor_blink_interval       0

# Selektion
selection_background        #7B52AB
selection_foreground        #E0DEF4

# URL
url_color                   #FF00FF
url_style                   curly

# Terminal Farben (ANSI)
# Black
color0                      #191724
color8                      #2a2a3d

# Red (Fehler / Alert)
color1                      #FF4444
color9                      #FF6666

# Green (Erfolg)
color2                      #31CF7F
color10                     #44E892

# Yellow / Orange (Warnung — Tokyo Tower)
color3                      #FF8C00
color11                     #FFB347

# Blue
color4                      #569CD6
color12                     #79B8FF

# Magenta (VTEC-Kick — das Highlight)
color5                      #FF00FF
color13                     #FF55FF

# Cyan
color6                      #4EC9B0
color14                     #6DDECF

# White
color7                      #E0DEF4
color15                     #FFFFFF


# -----------------------------------------------------------------------------
# TRANSPARENZ & BLUR — Die F-16 Kanzel
# background_opacity: 0.88 = man spürt die Stadt, aber liest alles klar
# blur wird von Hyprland gesteuert (decoration:blur in hyprland.conf)
# -----------------------------------------------------------------------------

background_opacity          0.88
dynamic_background_color    no


# -----------------------------------------------------------------------------
# FENSTER — Aerodynamische Geometrie
# Keine dicken Rahmen. Flache Hierarchien wie die NSX-Silhouette.
# -----------------------------------------------------------------------------

window_padding_width        12
window_border_width         1pt
active_border_color         #7B52AB
inactive_border_color       #2a2a3d
draw_minimal_borders        yes

remember_window_size        yes
initial_window_width        120c
initial_window_height       36c


# -----------------------------------------------------------------------------
# TABS — Instrument Cluster
# Tabs wirken wie die Satelliten-Schalter im NSX-Cockpit
# -----------------------------------------------------------------------------

tab_bar_style               powerline
tab_powerline_style         slanted
tab_bar_min_tabs            2
tab_bar_margin_width        0

active_tab_foreground       #0B0811
active_tab_background       #7B52AB
active_tab_font_style       bold

inactive_tab_foreground     #E0DEF4
inactive_tab_background     #191724
inactive_tab_font_style     normal

tab_bar_background          #0B0811


# -----------------------------------------------------------------------------
# CURSOR & MAUS
# -----------------------------------------------------------------------------

mouse_hide_wait             2.0
click_interval              0.5
focus_follows_mouse         no


# -----------------------------------------------------------------------------
# PERFORMANCE — Aluminium-Monocoque
# GPU-beschleunigt, kein Overhead
# -----------------------------------------------------------------------------

repaint_delay               8
input_delay                 2
sync_to_monitor             yes


# -----------------------------------------------------------------------------
# SHELL & STARTUP
# -----------------------------------------------------------------------------

shell                       zsh
editor                      nvim
close_on_child_death        no

# Startverzeichnis
startup_session             none


# -----------------------------------------------------------------------------
# KEYBINDINGS — Fingerkuppen-Bedienung
# Minimal. Nur was täglich gebraucht wird.
# -----------------------------------------------------------------------------

# Tabs
map ctrl+shift+t            new_tab_with_cwd
map ctrl+shift+w            close_tab
map ctrl+shift+right        next_tab
map ctrl+shift+left         previous_tab

# Fenster splitten
map ctrl+shift+enter        new_window_with_cwd
map ctrl+shift+]            next_window
map ctrl+shift+[            previous_window

# Schriftgröße
map ctrl+shift+equal        increase_font_size
map ctrl+shift+minus        decrease_font_size
map ctrl+shift+backspace    restore_font_size

# Clipboard
map ctrl+shift+c            copy_to_clipboard
map ctrl+shift+v            paste_from_clipboard

# Scrollback
map ctrl+shift+k            scroll_line_up
map ctrl+shift+j            scroll_line_down
map ctrl+shift+page_up      scroll_page_up
map ctrl+shift+page_down    scroll_page_down


# -----------------------------------------------------------------------------
# BELL — kein Lärm im Cockpit
# -----------------------------------------------------------------------------

enable_audio_bell           no
visual_bell_duration        0.0


# =============================================================================
# Ende — NSX Midnight Rice / kitty.conf
# "Elektronische Poesie. Flüssig, rhythmisch, eins mit der Maschine."
# =============================================================================
