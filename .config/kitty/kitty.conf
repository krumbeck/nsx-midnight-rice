# =============================================================================
# NSX Rice — kitty.conf
# Palette: Sanzo Wada — 7月の配色 / Tech Geisha
# =============================================================================

font_family                 JetBrainsMono Nerd Font
bold_font                   JetBrainsMono Nerd Font Bold
italic_font                 JetBrainsMono Nerd Font Italic
bold_italic_font            JetBrainsMono Nerd Font Bold Italic
font_size                   11.5
adjust_line_height          2
adjust_column_width         0

# -----------------------------------------------------------------------------
# FARBEN — 7月の配色
# -----------------------------------------------------------------------------

# 花色 — Violet Blue (Background)
background                  #1e1f3d
# 薄色 — Grayish Lavender (Text)
foreground                  #c4b8bc

# 飴色 — Orange Rufous (Cursor — warm, präzise)
cursor                      #c97a2a
cursor_text_color           #1e1f3d
cursor_shape                block
cursor_blink_interval       0

# Selektion — 桔梗色
selection_background        #5c3d9e
selection_foreground        #c4b8bc

# URL — 鳩羽紫
url_color                   #b57fb8
url_style                   curly

# ANSI Farben
# Black — 褐色 Abstufungen
color0                      #0d0d1f
color8                      #2d2d5e

# Red
color1                      #c45c5c
color9                      #d47070

# Green
color2                      #5c9e7a
color10                     #70b88e

# Yellow / Orange — 飴色
color3                      #c97a2a
color11                     #e08a35

# Blue — 花色 hell
color4                      #4a6fa5
color12                     #6088bb

# Magenta — 桔梗色
color5                      #5c3d9e
color13                     #7a5ab8

# Cyan — 二藍 aufgehellt
color6                      #4a6888
color14                     #6088a0

# White — 薄色
color7                      #c4b8bc
color15                     #ddd5d8

# -----------------------------------------------------------------------------
# TRANSPARENZ & BLUR — Glass Cockpit
# -----------------------------------------------------------------------------

background_opacity          0.88
dynamic_background_color    no

# -----------------------------------------------------------------------------
# FENSTER
# -----------------------------------------------------------------------------

window_padding_width        12
window_border_width         1pt
# 桔梗色 als aktive Border
active_border_color         #5c3d9e
# 褐色 als inaktive Border
inactive_border_color       #2d2d5e
draw_minimal_borders        yes
remember_window_size        yes
initial_window_width        120c
initial_window_height       36c

# -----------------------------------------------------------------------------
# TABS
# -----------------------------------------------------------------------------

tab_bar_style               powerline
tab_powerline_style         slanted
tab_bar_min_tabs            2
tab_bar_margin_width        0

# 飴色 auf 花色 — aktiver Tab
active_tab_foreground       #1e1f3d
active_tab_background       #c97a2a
active_tab_font_style       bold

# 薄色 auf 褐色 — inaktiver Tab
inactive_tab_foreground     #c4b8bc
inactive_tab_background     #0d0d1f
inactive_tab_font_style     normal

tab_bar_background          #0d0d1f

# -----------------------------------------------------------------------------
# PERFORMANCE
# -----------------------------------------------------------------------------

repaint_delay               8
input_delay                 2
sync_to_monitor             yes
enable_audio_bell           no
visual_bell_duration        0.0

# -----------------------------------------------------------------------------
# SHELL & KEYBINDINGS
# -----------------------------------------------------------------------------

shell                       zsh
editor                      nvim

map ctrl+shift+t            new_tab_with_cwd
map ctrl+shift+w            close_tab
map ctrl+shift+right        next_tab
map ctrl+shift+left         previous_tab
map ctrl+shift+enter        new_window_with_cwd
map ctrl+shift+]            next_window
map ctrl+shift+[            previous_window
map ctrl+shift+equal        increase_font_size
map ctrl+shift+minus        decrease_font_size
map ctrl+shift+backspace    restore_font_size
map ctrl+shift+c            copy_to_clipboard
map ctrl+shift+v            paste_from_clipboard
map ctrl+shift+k            scroll_line_up
map ctrl+shift+j            scroll_line_down

# =============================================================================
# Ende — NSX Rice / kitty.conf — 7月の配色
# =============================================================================
