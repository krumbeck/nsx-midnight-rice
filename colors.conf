# =============================================================================
# NSX Rice — colors.conf
# Palette: Sanzo Wada — 7月の配色 (Juli Farbkombination)
# Quelle: Dictionary of Color Combinations Vol.2, Seigensha
# Konzept: Tech Geisha — japanische Farbkomposition trifft präzise Ingenieurskunst
#
#
# Farbdefinitionen (CMYK Quelle → HEX für Bildschirm):
# =============================================================================

# -----------------------------------------------------------------------------
# PRIMÄRE SCHICHT — Background & Surface
# -----------------------------------------------------------------------------

# 花色 (はないろ) — Violet Blue
# C85 M79 Y38 K16
# Die Farbe der Wisteria-Blüte bei Nacht — tief, gesättigt, lebendig
# Rolle: Background (Fundament des gesamten Systems)
$hana_iro = #1e1f3d

# 二藍 (ふたあい) — Dark Soft Violet
# C70 M68 Y13 K0
# Zweifach gefärbtes Indigo — die Farbe alter Kimonos
# Rolle: Surface (Fenster, Islands, Cards)
$futa_ai = #2d2d5e

# 褐色 (かちいろ) — Dull Violet Black
# C100 M90 Y38 K50
# Fast schwarz mit violettem Kern — wie Tinte auf Seide
# Rolle: Tiefster Schatten, inactive Borders
$kachi_iro = #0d0d1f

# -----------------------------------------------------------------------------
# AKZENTE — die lebendige Schicht
# -----------------------------------------------------------------------------

# 桔梗色 (ききょういろ) — Blue Violet
# C72 M80 Y0 K0
# Die Farbe der Kikyo-Blume (Ballonblume) — klar, präzise, unvermischt
# Rolle: Primary Accent (aktive Borders, Workspace-Indikator)
$kikkyo_iro = #5c3d9e

# 鳩羽紫 (はとばむらさき) — Lilac
# C28 M54 Y8 K0
# Die Farbe der Taubenflügel — weich, zurückhaltend, elegant
# Rolle: Secondary Accent (Highlights, sekundäre UI-Elemente)
$hato_murasaki = #b57fb8

# -----------------------------------------------------------------------------
# TEXT — Lesbarkeitsschicht
# -----------------------------------------------------------------------------

# 薄色 (うすいろ) — Grayish Lavender
# C25 M33 Y20 K0
# Verdünntes Violett — wie Morgennebel
# Rolle: Primary Text (kein hartes Weiß — warm und lesbar)
$usu_iro = #c4b8bc

# Gedämpfter Text (abgeleitet, nicht im Buch)
# Rolle: Inaktive Labels, Kommentare, Timestamps
$text_dim = #6e6a86

# -----------------------------------------------------------------------------
# AKZENT-PUNKT — 飴色
# -----------------------------------------------------------------------------

# 飴色 (あめいろ) — Orange Rufous
# C18 M65 Y100 K8
# Die Farbe von Reiskaramell — warm, organisch, selten
# Rolle: Cursor, aktive Tabs, kleine Marker — NICHT als Fläche
$ame_iro = #c97a2a

# Etwas heller für Hover-States
$ame_iro_bright = #e08a35

# -----------------------------------------------------------------------------
# FUNKTIONALE FARBEN (nicht aus Wada — technisch notwendig)
# -----------------------------------------------------------------------------

# Fehler / Critical — so neutral wie möglich gehalten
$error = #c45c5c

# Erfolg
$success = #5c9e7a

# Warning (飴色 gedämpft)
$warning = #a86520

# =============================================================================
# SCHNELLREFERENZ für Config-Files
# =============================================================================
#
# Background:        #1e1f3d   花色
# Surface:           #2d2d5e   二藍
# Deep Shadow:       #0d0d1f   褐色
# Primary Accent:    #5c3d9e   桔梗色
# Secondary Accent:  #b57fb8   鳩羽紫
# Primary Text:      #c4b8bc   薄色
# Dim Text:          #6e6a86   (abgeleitet)
# Cursor/Active:     #c97a2a   飴色
# Error:             #c45c5c
# Success:           #5c9e7a
#
# =============================================================================
